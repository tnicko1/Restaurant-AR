<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Lions — AR Menu</title>
    <meta name="description" content="Burger Lions restaurant menu. View dishes in Augmented Reality before you order.">
    <meta property="og:title" content="Burger Lions — AR Menu">
    <meta property="og:description" content="Browse our menu and place dishes on your table in Augmented Reality.">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --t: 0.22s ease; }

        [data-theme="night"] {
            --bg:          #0d0d0d;
            --card:        #161616;
            --card2:       #1c1c1c;
            --border:      rgba(240,192,64,0.2);
            --text:        #e0e0e0;
            --dim:         #888888;
            --accent:      #f0c040;
            --accent-text: #0d0d0d;
            --thumb-bg:    #1a1a1a;
            --modal-bg:    #0d0d0d;
        }

        [data-theme="day"] {
            --bg:          #f4f4f4;
            --card:        #ffffff;
            --card2:       #eeeeee;
            --border:      rgba(160,110,0,0.2);
            --text:        #1a1a1a;
            --dim:         #666666;
            --accent:      #a87000;
            --accent-text: #ffffff;
            --thumb-bg:    #e8e8e8;
            --modal-bg:    #f0f0f0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        button { touch-action: manipulation; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            padding: 0 16px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background var(--t), color var(--t);
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 64px 0 24px;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 10vw, 3.8rem);
            letter-spacing: 8px;
            color: var(--accent);
            line-height: 1;
            transition: color var(--t);
        }

        .tagline {
            font-size: 0.68rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--dim);
            margin-top: 6px;
            font-weight: 700;
            transition: color var(--t);
        }

        #theme-toggle, #lang-toggle {
            position: fixed;
            top: 14px;
            z-index: 1000;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background var(--t), color var(--t), border-color var(--t);
        }
        #theme-toggle { right: 14px; }
        #lang-toggle  { left: 14px; }
        #theme-toggle:active, #lang-toggle:active { opacity: 0.65; }

        .menu-list {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .menu-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            padding: 12px;
            gap: 12px;
            align-items: center;
            transition: background var(--t), border-color var(--t);
            contain: content;
            touch-action: manipulation;
        }
        .menu-item:active { opacity: 0.75; transition: opacity 0.08s; }

        .thumb-wrap {
            width: 108px;
            height: 108px;
            flex-shrink: 0;
            border-radius: 14px;
            overflow: hidden;
            background: var(--thumb-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background var(--t), border-color var(--t);
        }
        .thumb-wrap model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
            display: block;
        }

        .item-details { flex: 1; min-width: 0; user-select: none; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 5px;
        }

        .item-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.45rem;
            letter-spacing: 2px;
            color: var(--accent);
            line-height: 1.1;
            transition: color var(--t);
            overflow-wrap: break-word;
            min-width: 0;
        }

        .ar-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 9px;
            padding: 7px 10px;
            font-size: 0.63rem;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            letter-spacing: 0.8px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            text-transform: uppercase;
            transition: background var(--t), opacity 0.15s;
        }
        .ar-btn:active { opacity: 0.7; transition: opacity 0.08s; }
        .ar-btn:disabled { opacity: 0.45; cursor: wait; }

        .ingredients {
            font-size: 0.8rem;
            color: var(--dim);
            margin-bottom: 7px;
            line-height: 1.45;
            transition: color var(--t);
            overflow-wrap: break-word;
        }

        .price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.15rem;
            letter-spacing: 1px;
            color: var(--accent);
            transition: color var(--t);
        }

        .category-header {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 5px;
            color: var(--accent);
            padding: 20px 4px 8px;
            border-bottom: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            transition: color var(--t), border-color var(--t);
        }

        /* ── Modal ── */
        #modal {
            position: fixed;
            inset: 0;
            background: var(--modal-bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background var(--t);
        }
        #modal.active { opacity: 1; }

        .modal-bar {
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 5px;
            color: var(--accent);
            transition: color var(--t);
        }

        .close-btn {
            background: var(--card2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: background var(--t), color var(--t);
        }

        #modal-viewer {
            width: 95vw;
            height: 75vh;
            background: transparent;
        }

        .tip {
            margin-top: 10px;
            color: var(--dim);
            font-size: 0.82rem;
            letter-spacing: 1px;
            transition: color var(--t);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            color: var(--text);
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-arrow:active { opacity: 0.65; }
        .left-arrow  { left: 10px; }
        .right-arrow { right: 10px; }

        /* ── WebXR overlay ── */
        #xr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 51;
            pointer-events: none;
        }
        #xr-gesture-layer {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: all;
        }
        #xr-place-hint {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            padding: 12px 22px;
            border-radius: 24px;
            white-space: nowrap;
        }
        #xr-nav-row {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: all;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.65);
            padding: 8px 20px;
            border-radius: 30px;
        }
        #xr-nav-row button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #xr-move-hint {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            white-space: nowrap;
        }
        #xr-exit {
            pointer-events: all;
            position: absolute;
            top: 18px;
            right: 18px;
            background: rgba(0,0,0,0.65);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Toggle theme">Day</button>
    <button id="lang-toggle" aria-label="Toggle language">KA</button>

    <div class="header">
        <h1>Burger Lions</h1>
        <div class="tagline" id="tagline">Taste the Wild</div>
    </div>

    <div class="menu-list" id="menu-list"></div>

    <div id="modal">
        <button class="nav-arrow left-arrow"  id="modal-prev">&#10094;</button>
        <button class="nav-arrow right-arrow" id="modal-next">&#10095;</button>
        <div class="modal-bar">
            <div id="modal-title"></div>
            <button class="close-btn" id="close-btn">Close</button>
        </div>
        <model-viewer id="modal-viewer"
            camera-controls
            shadow-intensity="1"
            min-camera-orbit="auto 0deg auto"
            max-camera-orbit="auto 90deg auto">
        </model-viewer>
        <p class="tip" id="modal-tip">Drag to rotate</p>
    </div>

    <div id="xr-overlay">
        <div id="xr-gesture-layer"></div>
        <div id="xr-place-hint">Point at a flat surface, then tap to place</div>
        <div id="xr-nav-row">
            <button id="xr-prev">&#10094;</button>
            <button id="xr-next">&#10095;</button>
        </div>
        <div id="xr-move-hint">Drag to move &middot; Twist two fingers to rotate</div>
        <button id="xr-exit">Exit AR</button>
    </div>

    <!-- WebXR — Three.js loaded lazily on first AR tap, not on page load -->
    <script>
    (function () {
        let THREE, GLTFLoader;
        let renderer, scene, camera, reticle, xrCanvas;
        let carouselRoot, slotGroups = [];
        let gestureLayer, xrOverlay;
        let hitTestSource = null, xrSession = null, xrStarting = false;
        let placed = false, isAnimating = false;

        let MENU = [], N = 0;
        const mod = i => ((i % N) + N) % N;
        let currentCenterMenu = 0;
        let slotOf     = { left: 0, center: 1, right: 2, hidden: 3 };
        let menuOf     = [0, 0, 0, 0];
        let hiddenSide = 'farRight';
        const meshObjs   = [null, null, null, null];
        const modelGLTFs = {};
        let loader;

        const CFG = {
            farLeft:  { x: -0.35, z: -0.12, s: 0.20, opacity: 0    },
            left:     { x: -0.14, z: -0.08, s: 0.20, opacity: 0.65 },
            center:   { x:  0,    z:  0,    s: 0.25, opacity: 1.0  },
            right:    { x:  0.14, z: -0.08, s: 0.20, opacity: 0.65 },
            farRight: { x:  0.35, z: -0.12, s: 0.20, opacity: 0    },
        };
        const INIT_ROLES    = ['left', 'center', 'right', 'farRight'];
        const DUR           = 350;
        const MOVE_SCALE    = 0.0015;
        const ROTATE_SCALE  = 0.005;
        const DEAD_ZONE     = 3;
        const MAX_DELTA     = 40;
        const activeTouches = new Map();

        // ── Models ────────────────────────────────────────────────────
        function preloadModels() {
            const paths = [...new Set(MENU.map(m => m.model || 'food.glb'))];
            return Promise.all(paths.map(p =>
                new Promise((res, rej) =>
                    loader.load(p, gltf => { modelGLTFs[p] = gltf; res(); }, undefined, rej)
                )
            ));
        }

        function cloneModel(menuIdx) {
            const gltf = modelGLTFs[MENU[menuIdx].model || 'food.glb'];
            if (!gltf) return null;
            const obj = gltf.scene.clone(true);
            obj.traverse(n => { if (n.isMesh && n.material) n.material = n.material.clone(); });
            return obj;
        }

        function setSlotModel(slotIdx, menuIdx) {
            const old = meshObjs[slotIdx];
            if (old) slotGroups[slotIdx].remove(old);
            const obj = cloneModel(menuIdx);
            if (obj) {
                const box = new THREE.Box3().setFromObject(obj);
                if (isFinite(box.min.y)) obj.position.y = -box.min.y;
                slotGroups[slotIdx].add(obj);
                meshObjs[slotIdx] = obj;
            }
        }

        function initSlots() {
            const c = currentCenterMenu;
            menuOf = [mod(c - 1), c, mod(c + 1), mod(c + 2)];
            for (let i = 0; i < 4; i++) setSlotModel(i, menuOf[i]);
            const opacities = [CFG.left.opacity, CFG.center.opacity, CFG.right.opacity, 0];
            INIT_ROLES.forEach((role, i) => {
                slotGroups[i].position.x = CFG[role].x;
                slotGroups[i].position.z = CFG[role].z;
                slotGroups[i].scale.setScalar(CFG[role].s);
                slotGroups[i].rotation.set(0, 0, 0);
                setOpacity(i, opacities[i]);
            });
        }

        // ── Opacity ───────────────────────────────────────────────────
        function setOpacity(idx, opacity) {
            const obj = meshObjs[idx];
            if (!obj) return;
            obj.traverse(n => {
                if (n.isMesh && n.material) {
                    n.material.transparent = opacity < 1.0;
                    n.material.opacity     = Math.max(0, Math.min(1, opacity));
                    n.material.needsUpdate = true;
                }
            });
        }

        function animOpacity(idx, from, to, dur) {
            const t0 = performance.now();
            (function tick(now) {
                const t = Math.min((now - t0) / dur, 1);
                const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
                setOpacity(idx, from + (to - from) * e);
                if (t < 1) requestAnimationFrame(tick);
            })(performance.now());
        }

        // ── Slot animation ────────────────────────────────────────────
        function snapSlot(idx, role) {
            slotGroups[idx].position.x = CFG[role].x;
            slotGroups[idx].position.z = CFG[role].z;
            slotGroups[idx].scale.setScalar(CFG[role].s);
        }

        function animSlot(idx, role, dur) {
            const x0 = slotGroups[idx].position.x, x1 = CFG[role].x;
            const z0 = slotGroups[idx].position.z, z1 = CFG[role].z;
            const s0 = slotGroups[idx].scale.x,    s1 = CFG[role].s;
            const t0 = performance.now();
            (function tick(now) {
                const t = Math.min((now - t0) / dur, 1);
                const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
                slotGroups[idx].position.x = x0 + (x1 - x0) * e;
                slotGroups[idx].position.z = z0 + (z1 - z0) * e;
                slotGroups[idx].scale.setScalar(s0 + (s1 - s0) * e);
                if (t < 1) requestAnimationFrame(tick);
            })(performance.now());
        }

        // ── Navigation ────────────────────────────────────────────────
        function goNext() {
            if (isAnimating) return;
            isAnimating = true;
            const { left: lIdx, center: cIdx, right: rIdx, hidden: hIdx } = slotOf;
            if (hiddenSide === 'farLeft') snapSlot(hIdx, 'farRight');
            menuOf[hIdx] = mod(menuOf[rIdx] + 1);
            setSlotModel(hIdx, menuOf[hIdx]); setOpacity(hIdx, 0);
            animSlot(lIdx, 'farLeft', DUR); animSlot(cIdx, 'left',  DUR);
            animSlot(rIdx, 'center',  DUR); animSlot(hIdx, 'right', DUR);
            animOpacity(lIdx, CFG.left.opacity,   0,                  DUR);
            animOpacity(cIdx, CFG.center.opacity, CFG.left.opacity,   DUR);
            animOpacity(rIdx, CFG.right.opacity,  CFG.center.opacity, DUR);
            animOpacity(hIdx, 0,                  CFG.right.opacity,  DUR);
            setTimeout(() => {
                slotOf = { left: cIdx, center: rIdx, right: hIdx, hidden: lIdx };
                hiddenSide = 'farLeft'; currentCenterMenu = mod(currentCenterMenu + 1);
                isAnimating = false;
            }, DUR + 10);
        }

        function goPrev() {
            if (isAnimating) return;
            isAnimating = true;
            const { left: lIdx, center: cIdx, right: rIdx, hidden: hIdx } = slotOf;
            if (hiddenSide === 'farRight') snapSlot(hIdx, 'farLeft');
            menuOf[hIdx] = mod(menuOf[lIdx] - 1);
            setSlotModel(hIdx, menuOf[hIdx]); setOpacity(hIdx, 0);
            animSlot(rIdx, 'farRight', DUR); animSlot(cIdx, 'right', DUR);
            animSlot(lIdx, 'center',   DUR); animSlot(hIdx, 'left',  DUR);
            animOpacity(rIdx, CFG.right.opacity,  0,                   DUR);
            animOpacity(cIdx, CFG.center.opacity, CFG.right.opacity,   DUR);
            animOpacity(lIdx, CFG.left.opacity,   CFG.center.opacity,  DUR);
            animOpacity(hIdx, 0,                  CFG.left.opacity,    DUR);
            setTimeout(() => {
                slotOf = { left: hIdx, center: lIdx, right: cIdx, hidden: rIdx };
                hiddenSide = 'farRight'; currentCenterMenu = mod(currentCenterMenu - 1);
                isAnimating = false;
            }, DUR + 10);
        }

        // ── Placement ─────────────────────────────────────────────────
        function onSelect() {
            if (placed || !reticle.visible) return;
            carouselRoot.position.setFromMatrixPosition(reticle.matrix);
            carouselRoot.quaternion.setFromRotationMatrix(reticle.matrix);
            carouselRoot.visible = true;
            reticle.visible      = false;
            placed               = true;
            gestureLayer.style.display = 'block';
            document.getElementById('xr-place-hint').style.display = 'none';
            document.getElementById('xr-nav-row').style.display    = 'flex';
            document.getElementById('xr-move-hint').style.display  = 'block';
        }

        // ── One-time init — deferred until first AR tap ───────────────
        let _setupDone = false;

        async function _setup() {
            if (_setupDone) return;
            _setupDone = true;

            const [threeNS, loaderMod] = await Promise.all([
                import('https://esm.sh/three@0.155.0'),
                import('https://esm.sh/three@0.155.0/examples/jsm/loaders/GLTFLoader')
            ]);
            THREE      = threeNS;
            GLTFLoader = loaderMod.GLTFLoader;
            loader     = new GLTFLoader();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local');
            xrCanvas = renderer.domElement;
            Object.assign(xrCanvas.style, {
                position: 'fixed', top: '0', left: '0',
                zIndex: '50', display: 'none'
            });
            document.body.appendChild(xrCanvas);

            scene  = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(0.5, 1, 0.25);
            scene.add(dirLight);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.07, 32),
                new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
            );
            reticle.rotation.x       = -Math.PI / 2;
            reticle.matrixAutoUpdate = false;
            reticle.visible          = false;
            scene.add(reticle);

            carouselRoot = new THREE.Group();
            scene.add(carouselRoot);
            carouselRoot.visible = false;
            slotGroups = Array.from({ length: 4 }, () => {
                const g = new THREE.Group(); carouselRoot.add(g); return g;
            });

            gestureLayer = document.getElementById('xr-gesture-layer');
            xrOverlay    = document.getElementById('xr-overlay');

            // Touch gestures on the gesture layer inside dom-overlay.
            // Canvas touch events are consumed by the XR runtime during a session;
            // dom-overlay elements receive normal HTML touch events instead.
            gestureLayer.addEventListener('touchstart', e => {
                for (const t of e.changedTouches)
                    activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY, prevX: t.clientX, prevY: t.clientY });
            }, { passive: true });

            gestureLayer.addEventListener('touchmove', e => {
                e.preventDefault();
                for (const t of e.changedTouches) {
                    const p = activeTouches.get(t.identifier);
                    if (p) activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY, prevX: p.x, prevY: p.y });
                }
                const all = [...activeTouches.values()];
                if (all.length === 1) {
                    let dx = all[0].x - all[0].prevX;
                    let dy = all[0].y - all[0].prevY;
                    if (Math.abs(dx) < DEAD_ZONE && Math.abs(dy) < DEAD_ZONE) return;
                    dx = Math.max(-MAX_DELTA, Math.min(MAX_DELTA, dx));
                    dy = Math.max(-MAX_DELTA, Math.min(MAX_DELTA, dy));
                    carouselRoot.position.x += dx * MOVE_SCALE;
                    carouselRoot.position.z += dy * MOVE_SCALE;
                } else if (all.length >= 2) {
                    const [left, right] = [...all].sort((a, b) => a.x - b.x);
                    let twist = ((right.y - right.prevY) - (left.y - left.prevY)) * 0.5;
                    if (Math.abs(twist) < DEAD_ZONE) return;
                    twist = Math.max(-MAX_DELTA, Math.min(MAX_DELTA, twist));
                    slotGroups[slotOf.center].rotation.y -= twist * ROTATE_SCALE;
                }
            }, { passive: false });

            gestureLayer.addEventListener('touchend', e => {
                for (const t of e.changedTouches) activeTouches.delete(t.identifier);
            }, { passive: true });

            renderer.xr.addEventListener('sessionstart', async () => {
                try {
                    const session     = renderer.xr.getSession();
                    const viewerSpace = await session.requestReferenceSpace('viewer');
                    hitTestSource     = await session.requestHitTestSource({ space: viewerSpace });
                } catch (e) { console.error('Hit-test setup failed:', e); }
            });

            renderer.xr.addEventListener('sessionend', () => {
                hitTestSource = null; placed = false;
                xrSession = null; xrStarting = false;
                carouselRoot.visible = false; reticle.visible = false;
                xrCanvas.style.display       = 'none';
                xrOverlay.style.display      = 'none';
                gestureLayer.style.display   = 'none';
                document.getElementById('xr-place-hint').style.display = 'block';
                document.getElementById('xr-nav-row').style.display    = 'none';
                document.getElementById('xr-move-hint').style.display  = 'none';
                activeTouches.clear();
                slotOf = { left: 0, center: 1, right: 2, hidden: 3 };
                hiddenSide = 'farRight'; isAnimating = false;
                initSlots();
                document.dispatchEvent(new CustomEvent('xr-session-end'));
            });

            renderer.setAnimationLoop((time, frame) => {
                if (frame && !placed && hitTestSource) {
                    const refSpace = renderer.xr.getReferenceSpace();
                    if (refSpace) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length > 0) {
                            const pose = results[0].getPose(refSpace);
                            if (pose) { reticle.visible = true; reticle.matrix.fromArray(pose.transform.matrix); }
                        } else { reticle.visible = false; }
                    }
                }
                renderer.render(scene, camera);
            });

            document.getElementById('xr-exit').addEventListener('click', () => xrSession?.end());
            document.getElementById('xr-prev').addEventListener('click', goPrev);
            document.getElementById('xr-next').addEventListener('click', goNext);
        }

        // ── Public API ────────────────────────────────────────────────
        window.XR = {
            async start(itemIndex, items) {
                if (xrStarting || xrSession) return;
                xrStarting = true;

                MENU = items; N = MENU.length;
                currentCenterMenu = Math.max(0, Math.min(itemIndex, N - 1));

                await _setup();

                try { await preloadModels(); }
                catch (e) { console.warn('Model preload partial failure:', e); }

                initSlots();

                try {
                    xrSession = await navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test'],
                        optionalFeatures: ['dom-overlay'],
                        domOverlay: { root: xrOverlay }
                    });
                } catch (e) {
                    console.error('XR session failed:', e);
                    xrStarting = false;
                    window.__arCap = 'none';
                    localStorage.setItem('bl-ar-cap', 'none');
                    document.dispatchEvent(new CustomEvent('xr-session-end', { detail: { fallbackIdx: itemIndex } }));
                    return;
                }

                xrSession.addEventListener('select', onSelect);
                await renderer.xr.setSession(xrSession);
                localStorage.setItem('bl-ar-cap', 'webxr');
                xrCanvas.style.display  = 'block';
                xrOverlay.style.display = 'block';
                document.dispatchEvent(new CustomEvent('xr-session-start'));
            }
        };
    })();
    </script>

    <!-- ── Catalog logic ──────────────────────────────────────────────── -->
    <script>
        const UI = {
            en: {
                tagline:   'Taste the Wild',
                viewAR:    'VIEW ON TABLE',
                view3D:    'VIEW IN 3D',
                loading:   'Loading...',
                close:     'Close',
                tip:       'Drag to rotate',
                placeHint: 'Point at a flat surface, then tap to place',
                moveHint:  'Drag to move · Twist two fingers to rotate',
                exitAR:    'Exit AR',
                langBtn:   'KA',
                themeDay:  'Day',
                themeNight:'Night',
            },
            ka: {
                tagline:   'გემო ველისა',
                viewAR:    'ᲛᲐᲒᲘᲓᲐᲖᲔ ᲜᲐᲮᲕᲐ',
                view3D:    '3D-ში ᲜᲐᲮᲕᲐ',
                loading:   'იტვირთება...',
                close:     'დახურვა',
                tip:       'სანახავად გადაათრიე',
                placeHint: 'მიანიშნე ბრტყელ ზედაპირზე, შემდეგ შეეხე',
                moveHint:  'გადასაადგილებლად გადაათრიე · ორი თითით შეტრიალება',
                exitAR:    'AR-ის დახურვა',
                langBtn:   'EN',
                themeDay:  'Day',
                themeNight:'Night',
            }
        };

        // ── Language ───────────────────────────────────────────────────
        window.__lang = localStorage.getItem('bl-lang') || 'en';

        function t(item, field) {
            const ka = field + '_ka';
            return (window.__lang === 'ka' && item[ka]) ? item[ka] : item[field];
        }

        function applyLang(lang) {
            window.__lang = lang;
            localStorage.setItem('bl-lang', lang);
            const u = UI[lang];
            const theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('tagline').textContent       = u.tagline;
            document.getElementById('lang-toggle').textContent   = u.langBtn;
            document.getElementById('theme-toggle').textContent  = theme === 'night' ? u.themeDay : u.themeNight;
            document.getElementById('close-btn').textContent     = u.close;
            document.getElementById('modal-tip').textContent     = u.tip;
            document.getElementById('xr-place-hint').textContent = u.placeHint;
            document.getElementById('xr-move-hint').textContent  = u.moveHint;
            document.getElementById('xr-exit').textContent       = u.exitAR;
            const btnText = window.__arCap === 'none' ? u.view3D : u.viewAR;
            document.querySelectorAll('.ar-btn:not(:disabled)').forEach(b => { b.textContent = btnText; });
            document.querySelectorAll('[data-field][data-idx]').forEach(el => {
                const item = menuItems[parseInt(el.dataset.idx)];
                if (item) el.textContent = t(item, el.dataset.field);
            });
            document.querySelectorAll('.category-header[data-cat-name]').forEach(el => {
                el.textContent = (lang === 'ka' && el.dataset.catNameKa) ? el.dataset.catNameKa : el.dataset.catName;
            });
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            applyLang(window.__lang === 'en' ? 'ka' : 'en');
        });

        // ── Theme ──────────────────────────────────────────────────────
        const html     = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeBtn.textContent = theme === 'night' ? UI[window.__lang].themeDay : UI[window.__lang].themeNight;
            localStorage.setItem('bl-theme', theme);
        }
        applyTheme(localStorage.getItem('bl-theme') || 'night');
        themeBtn.addEventListener('click', () => {
            applyTheme(html.getAttribute('data-theme') === 'night' ? 'day' : 'night');
        });

        // ── XR session state ───────────────────────────────────────────
        document.addEventListener('xr-session-start', () => {
            document.getElementById('theme-toggle').style.display = 'none';
            document.getElementById('lang-toggle').style.display  = 'none';
        });

        document.addEventListener('xr-session-end', e => {
            _arOpening = false;
            setARButtonsState(false);
            document.getElementById('theme-toggle').style.display = '';
            document.getElementById('lang-toggle').style.display  = '';
            if (e.detail?.fallbackIdx != null) openModal(e.detail.fallbackIdx, _arCatItems || menuItems);
        });

        // ── Modal ──────────────────────────────────────────────────────
        const modal       = document.getElementById('modal');
        const modalViewer = document.getElementById('modal-viewer');
        const modalTitle  = document.getElementById('modal-title');
        let menuItems  = [];
        let modalItems = [];
        let modalIndex = 0;

        document.getElementById('close-btn').addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.getElementById('modal-prev').addEventListener('click', e => {
            e.stopPropagation();
            modalIndex = (modalIndex - 1 + modalItems.length) % modalItems.length;
            updateModal();
        });
        document.getElementById('modal-next').addEventListener('click', e => {
            e.stopPropagation();
            modalIndex = (modalIndex + 1) % modalItems.length;
            updateModal();
        });

        function updateModal() {
            const item = modalItems[modalIndex];
            if (!item) return;
            modalViewer.src        = item.model || 'food.glb';
            modalTitle.textContent = t(item, 'name');
        }

        function openModal(localIdx, catItems) {
            modalItems = catItems || menuItems;
            modalIndex = localIdx;
            updateModal();
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
            document.body.style.overflow = 'hidden';
            // Defer thumbnail teardown past the modal fade-in frame so it doesn't block animation
            requestAnimationFrame(() => {
                document.querySelectorAll('.thumb-wrap model-viewer').forEach(mv => {
                    if (!mv.src) return;
                    const t = _thumbUnload.get(mv);
                    if (t) { clearTimeout(t); _thumbUnload.delete(mv); }
                    mv.dataset.pausedSrc = mv.src;
                    mv.removeAttribute('src');
                    _thumbActive.delete(mv);
                });
            });
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                modalViewer.removeAttribute('src');
                document.querySelectorAll('.thumb-wrap model-viewer').forEach(mv => {
                    if (!mv.dataset.pausedSrc) return;
                    delete mv.dataset.pausedSrc;
                    const r = mv.getBoundingClientRect();
                    if (r.bottom > -100 && r.top < window.innerHeight + 100) _scheduleThumb(mv);
                });
            }, 200);
            document.body.style.overflow = '';
        }

        // ── AR capability detection ────────────────────────────────────
        async function detectAR() {
            const cached = localStorage.getItem('bl-ar-cap');
            if (cached) { window.__arCap = cached; return cached; }

            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            let cap = 'none';
            if (navigator.xr) {
                try {
                    if (await navigator.xr.isSessionSupported('immersive-ar')) cap = 'webxr';
                } catch {}
            }
            if (cap === 'none' && isIOS) cap = 'arkit';
            window.__arCap = cap;
            if (cap !== 'webxr') localStorage.setItem('bl-ar-cap', cap);
            return cap;
        }

        function setARButtonsState(loading) {
            const u = UI[window.__lang];
            const label = loading ? u.loading : (window.__arCap === 'none' ? u.view3D : u.viewAR);
            document.querySelectorAll('.ar-btn').forEach(b => {
                b.textContent = label;
                b.disabled    = loading;
            });
        }

        // ── iOS AR launcher — hidden model-viewers pre-load so activateAR()
        //    can fire synchronously from the tap without losing the gesture context.
        const _arLaunchers = {};
        function _getARLauncher(src) {
            if (!_arLaunchers[src]) {
                const mv = document.createElement('model-viewer');
                mv.setAttribute('ar', '');
                mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
                mv.src = src;
                mv.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:-9999px;left:-9999px;';
                document.body.appendChild(mv);
                _arLaunchers[src] = mv;
            }
            return _arLaunchers[src];
        }

        // Pre-load both models on iOS so USDZ is ready before the user taps
        const _isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (_isIOS) ['food.glb', 'Druidi.glb'].forEach(src => _getARLauncher(src));

        // ── AR routing ─────────────────────────────────────────────────
        let _arOpening  = false;
        let _arCatItems = null;

        async function openAR(localIdx, catItems) {
            if (_arOpening) return;
            _arOpening  = true;
            _arCatItems = catItems || menuItems;
            setARButtonsState(true);

            const cap  = window.__arCap ?? await detectAR();
            const item = _arCatItems[localIdx];

            if (!item) { setARButtonsState(false); _arOpening = false; return; }

            if (cap === 'webxr' && window.XR) {
                try {
                    await window.XR.start(localIdx, _arCatItems);
                } catch (err) {
                    console.error('XR start failed:', err);
                    openModal(localIdx, _arCatItems);
                    setARButtonsState(false);
                    _arOpening = false;
                }
            } else if (cap === 'arkit') {
                // iOS — fire Quick Look directly via pre-loaded hidden model-viewer
                _getARLauncher(item.model || 'food.glb').activateAR();
                setTimeout(() => { setARButtonsState(false); _arOpening = false; }, 2500);
            } else {
                // No AR support (non-ARCore Android, desktop) — open 3D modal
                openModal(localIdx, _arCatItems);
                setARButtonsState(false);
                _arOpening = false;
            }
        }

        // ── Thumbnail loader — Set-based, concurrent-capped, delayed unload ──
        const MAX_ACTIVE_THUMBS = 4;
        const _thumbPending = new Set();
        const _thumbActive  = new Set();
        const _thumbUnload  = new WeakMap();
        let   _thumbTimer   = null;

        function _drainThumbs() {
            _thumbTimer = null;
            for (const mv of [..._thumbPending]) {
                if (_thumbActive.size >= MAX_ACTIVE_THUMBS) break;
                _thumbPending.delete(mv);
                if (!mv.isConnected) continue;
                _thumbActive.add(mv);
                if (!mv.src) mv.src = mv.dataset.src;
            }
            if (_thumbPending.size > 0) _thumbTimer = setTimeout(_drainThumbs, 150);
        }

        function _scheduleThumb(mv) {
            const t = _thumbUnload.get(mv);
            if (t) { clearTimeout(t); _thumbUnload.delete(mv); }
            if (_thumbPending.has(mv) || _thumbActive.has(mv)) return;
            _thumbPending.add(mv);
            if (!_thumbTimer) _thumbTimer = setTimeout(_drainThumbs, 0);
        }

        function _unscheduleThumb(mv) {
            _thumbPending.delete(mv);
            if (!mv.src) return;
            const t = setTimeout(() => {
                _thumbUnload.delete(mv);
                _thumbActive.delete(mv);
                if (!mv.dataset.pausedSrc) mv.removeAttribute('src');
                if (_thumbPending.size > 0 && !_thumbTimer)
                    _thumbTimer = setTimeout(_drainThumbs, 0);
            }, 2000);
            _thumbUnload.set(mv, t);
        }

        const thumbObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) _scheduleThumb(entry.target);
                else                       _unscheduleThumb(entry.target);
            });
        }, { rootMargin: '200px' });

        // ── Build menu ─────────────────────────────────────────────────

        async function buildMenu() {
            const fallback = [
                { name: 'Druidi',    name_ka: 'დრუიდი',    category: 'Burgers', category_ka: 'ბურგერები', description: 'Ancient grain patty, roasted herbs, olive oil & spiced lamb',              description_ka: 'ძველი მარცვლეულის კოტლეტი შებრაწული მწვანილებით, ზეთისხილის ზეთითა და სანელებლებიანი ბატკნის ხორცით', price: '$18.99', model: 'Druidi.glb' },
                { name: 'Asteroidi', name_ka: 'ასტეროიდი', category: 'Burgers', category_ka: 'ბურგერები', description: 'Crispy smash patty, spiced chickpea & tahini drizzle',                     description_ka: 'ხრაშუნა კოტლეტი სანელებლებიანი ბლის შიგთავსით და ტაჰინის სოუსით',                                          price: '$12.99', model: 'food.glb'   },
                { name: 'Iulius',    name_ka: 'იულიუსი',   category: 'Sides',   category_ka: 'გარნირები',  description: 'Slow-braised veal burger with saffron aioli & gremolata',                  description_ka: 'ნელა გახარშული ხბოს ბურგერი შაფრანის ემულსიითა და გრემოლატათი',                                         price: '$24.99', model: 'Druidi.glb' },
                { name: 'Pompeii',   name_ka: 'პომპეი',    category: 'Drinks',  category_ka: 'სასმელები',  description: 'Wood-fired bun, San Marzano tomato & buffalo mozzarella',                  description_ka: 'შეშის ღუმელში გამომცხვარი ბურგერი სან-მარძანოს პომიდვრით და კამეჩის მოცარელათი',                    price: '$14.99', model: 'food.glb'   },
                { name: 'Galius',    name_ka: 'გალიუსი',   category: 'Desserts', category_ka: 'დესერტები', description: 'Charcoal-grilled chicken with roasted garlic & wild herbs',                 description_ka: 'ნახშირზე შემწვარი წიწილა შებრაწული ნიორითა და ველური მწვანილებით',                                      price: '$16.99', model: 'Druidi.glb' },
            ];

            // Read cached AR cap synchronously so first render uses correct label if known
            const cachedCap = localStorage.getItem('bl-ar-cap');
            if (cachedCap) window.__arCap = cachedCap;
            // Start detection in background — don't block menu render on it
            const arCapPromise = detectAR();

            const items = await fetch('./foods/menu.json').then(r => r.json()).catch(() => fallback);
            menuItems = items;

            const initialLabel = window.__arCap === 'none' ? UI[window.__lang].view3D : UI[window.__lang].viewAR;

            // Group by category, preserving order from JSON
            const categories = [];
            const categoryMap = new Map();
            items.forEach((item, globalIdx) => {
                const key = item.category || 'Other';
                if (!categoryMap.has(key)) {
                    const cat = { name: key, name_ka: item.category_ka || key, items: [] };
                    categories.push(cat);
                    categoryMap.set(key, cat);
                }
                categoryMap.get(key).items.push({ item, globalIdx });
            });

            const list = document.getElementById('menu-list');

            categories.forEach(cat => {
                const catItems = cat.items.map(e => e.item);

                const header = document.createElement('div');
                header.className = 'category-header';
                header.dataset.catName   = cat.name;
                header.dataset.catNameKa = cat.name_ka;
                header.textContent = window.__lang === 'ka' ? cat.name_ka : cat.name;
                list.appendChild(header);

                cat.items.forEach(({ item, globalIdx }, localIdx) => {
                    const card = document.createElement('div');
                    card.className = 'menu-item';
                    card.innerHTML = `
                        <div class="thumb-wrap">
                            <model-viewer
                                data-src="${item.model || 'food.glb'}"
                                shadow-intensity="0"
                                interaction-prompt="none">
                            </model-viewer>
                        </div>
                        <div class="item-details">
                            <div class="item-header">
                                <p class="item-name" data-field="name" data-idx="${globalIdx}">${t(item, 'name')}</p>
                                <button class="ar-btn">${initialLabel}</button>
                            </div>
                            <p class="ingredients" data-field="description" data-idx="${globalIdx}">${t(item, 'description')}</p>
                            <p class="price">${item.price}</p>
                        </div>`;

                    const mv = card.querySelector('model-viewer');
                    thumbObserver.observe(mv);

                    let _px = 0, _py = 0;
                    mv.addEventListener('pointerdown', e => { _px = e.clientX; _py = e.clientY; });
                    mv.addEventListener('pointerup', e => {
                        if (Math.abs(e.clientX - _px) < 6 && Math.abs(e.clientY - _py) < 6)
                            openModal(localIdx, catItems);
                    });

                    card.querySelector('.item-details').addEventListener('click', () => openModal(localIdx, catItems));
                    card.querySelector('.ar-btn').addEventListener('click', e => { e.stopPropagation(); openAR(localIdx, catItems); });

                    list.appendChild(card);
                });
            });

            applyLang(window.__lang);

            // Correct button labels once AR detection resolves (instant if cap was cached)
            arCapPromise.then(() => {
                const u = UI[window.__lang];
                const finalLabel = window.__arCap === 'none' ? u.view3D : u.viewAR;
                if (finalLabel !== initialLabel)
                    document.querySelectorAll('.ar-btn:not(:disabled)').forEach(b => { b.textContent = finalLabel; });
            });
        }

        buildMenu();
    </script>
