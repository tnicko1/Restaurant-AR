<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instant WebAR Menu</title>
    <style>
      body { margin: 0; background: #09090b; color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
      .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #34d399; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status { color: #a1a1aa; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <div class="status" id="status">Initializing AR Engine...</div>
    <script>
      const statusEl = document.getElementById('status');
      
      async function routeUser() {
        statusEl.innerText = "Checking environment...";
        // Delay slightly so the UI shows up
        await new Promise(resolve => setTimeout(resolve, 300));
        
        try {
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
          
          if (navigator.xr && navigator.xr.isSessionSupported) {
            statusEl.innerText = "Checking AR capabilities...";
            const supported = await navigator.xr.isSessionSupported('immersive-ar');
            if (supported || isIOS) {
              statusEl.innerText = "Launching Advanced AR...";
              window.location.replace('./advanced-ar.html');
            } else {
              statusEl.innerText = "Launching Universal AR...";
              window.location.replace('./mind-ar-fallback.html');
            }
          } else {
            if (isIOS) {
              statusEl.innerText = "Launching Advanced AR...";
              window.location.replace('./advanced-ar.html');
            } else {
              statusEl.innerText = "Launching Universal AR...";
              window.location.replace('./mind-ar-fallback.html');
            }
          }
        } catch (err) {
          console.error(err);
          statusEl.innerText = "Launching Universal AR...";
          window.location.replace('./mind-ar-fallback.html');
        }
      }
      
      routeUser();
    </script>
  </body>
</html>
