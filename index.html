<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading Menu...</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <h2>Loading 3D Menu...</h2>

    <script>
        function routeUser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // 1. The "Pure Apple" Bypass
            // This checks for iPhones, iPods, and modern iPads (which pretend to be Macs)
            const isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            // 2. The Absolute OS Split
            if (isIOS) {
                // ALL Apple devices go straight to the premium Model Viewer
                window.location.replace("advanced-ar.html");
            } 
            else {
                // ALL Androids (Poco, Xiaomi, Samsung) go straight to the working MindAR camera
                window.location.replace("mind-ar-fallback.html");
            }
        }

        // Execute immediately
        routeUser();
    </script>
</body>
</html>
