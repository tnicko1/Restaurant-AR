<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebXR AR Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: sans-serif; overflow: hidden; }

        #pre-ar {
            position: fixed; inset: 0; z-index: 20;
            background: #111; color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 32px; text-align: center;
        }
        #pre-ar h2 { font-size: 22px; }
        #pre-ar p  { font-size: 14px; color: #999; max-width: 300px; line-height: 1.6; }
        #status    { font-size: 13px; color: #666; min-height: 20px; }

        #btn-start {
            display: none; background: #ff4757; color: white;
            border: none; padding: 16px 36px; border-radius: 30px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        #btn-unsupported {
            display: none; background: transparent; color: #888;
            border: 1px solid #555; padding: 12px 24px;
            border-radius: 20px; font-size: 14px; cursor: pointer;
        }
        .back-link {
            position: fixed; top: 18px; left: 18px; z-index: 25;
            color: #666; font-size: 13px; text-decoration: none;
        }

        #ar-overlay {
            position: fixed; inset: 0; z-index: 10;
            pointer-events: none; display: none;
        }
        #place-hint {
            position: absolute; bottom: 110px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65); color: white;
            font-size: 15px; padding: 12px 22px;
            border-radius: 24px; white-space: nowrap;
        }
        #item-label {
            display: none; position: absolute;
            top: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.65); color: white;
            font-size: 14px; padding: 8px 18px;
            border-radius: 20px; white-space: nowrap;
        }
        #swipe-hint {
            display: none; position: absolute;
            bottom: 70px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 13px; white-space: nowrap;
        }
        #btn-exit {
            pointer-events: all;
            position: absolute; top: 18px; right: 18px;
            background: rgba(0,0,0,0.55); color: #ccc;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 8px 16px; border-radius: 20px;
            font-size: 13px; cursor: pointer;
        }
    </style>
</head>
<body>

    <a class="back-link" href="index.html">&#8592; Menu</a>

    <div id="pre-ar">
        <h2>3-Model WebXR AR</h2>
        <p>Point your camera at a flat surface and tap to place three menu items side by side. Swipe left or right to browse.</p>
        <div id="status">Loading menu…</div>
        <button id="btn-start">Start AR</button>
        <button id="btn-unsupported" onclick="history.back()">Not supported — go back</button>
    </div>

    <div id="ar-overlay">
        <div id="place-hint">Point at a flat surface, then tap to place</div>
        <div id="item-label"></div>
        <div id="swipe-hint">&#8592; swipe to browse &#8594;</div>
        <button id="btn-exit">Exit AR</button>
    </div>

    <script type="module">
        import * as THREE    from 'https://esm.sh/three@0.155.0';
        import { GLTFLoader } from 'https://esm.sh/three@0.155.0/examples/jsm/loaders/GLTFLoader';

        // ── Renderer ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        renderer.xr.setReferenceSpaceType('local');
        Object.assign(renderer.domElement.style, {
            position: 'fixed', top: '0', left: '0', zIndex: '1'
        });
        document.body.appendChild(renderer.domElement);

        // ── Scene & lights ────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(0.5, 1, 0.25);
        scene.add(dirLight);

        // ── Reticle ───────────────────────────────────────────────────────────
        const reticle = new THREE.Mesh(
            new THREE.RingGeometry(0.04, 0.07, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
        );
        reticle.rotation.x = -Math.PI / 2;
        reticle.matrixAutoUpdate = false;
        reticle.visible = false;
        scene.add(reticle);

        // ── Carousel root ─────────────────────────────────────────────────────
        const carouselRoot = new THREE.Group();
        scene.add(carouselRoot);
        carouselRoot.visible = false;

        const slotGroups = Array.from({ length: 4 }, () => {
            const g = new THREE.Group();
            carouselRoot.add(g);
            return g;
        });

        // ── Menu & model state ────────────────────────────────────────────────
        let MENU = [];
        let N    = 0;
        const mod = i => ((i % N) + N) % N;

        const CFG = {
            farLeft:  { x: -0.35, z: -0.12, s: 0.20, opacity: 0    },
            left:     { x: -0.14, z: -0.08, s: 0.20, opacity: 0.65 },
            center:   { x:  0,    z:  0,    s: 0.25, opacity: 1.0  },
            right:    { x:  0.14, z: -0.08, s: 0.20, opacity: 0.65 },
            farRight: { x:  0.35, z: -0.12, s: 0.20, opacity: 0    },
        };

        const INIT_ROLES       = ['left', 'center', 'right', 'farRight'];
        let slotOf             = { left: 0, center: 1, right: 2, hidden: 3 };
        let menuOf             = [0, 0, 0, 0];
        let hiddenSide         = 'farRight';
        let currentCenterMenu  = 0;
        let isAnimating        = false;
        let placed             = false;
        const DUR              = 350;
        const meshObjs         = [null, null, null, null];

        // ── Model loading ─────────────────────────────────────────────────────
        const modelGLTFs = {};
        const loader     = new GLTFLoader();

        async function fetchMenu() {
            try {
                const res = await fetch('./foods/menu.json');
                MENU = await res.json();
            } catch {
                MENU = [
                    { name: 'Druidi',    description: 'Ancient grain bowl with roasted herbs, olive oil & spiced lamb',              price: '$18.99', model: 'Druidi.glb' },
                    { name: 'Asteroidi', description: 'Crispy meteor-shaped fritters with spiced chickpea filling & tahini drizzle', price: '$12.99', model: 'food.glb'   },
                    { name: 'Iulius',    description: 'Slow-braised veal shank with saffron risotto & gremolata',                    price: '$24.99', model: 'Druidi.glb' },
                    { name: 'Pompeii',   description: 'Wood-fired flatbread with San Marzano tomato, buffalo mozzarella & basil',   price: '$14.99', model: 'food.glb'   },
                    { name: 'Galius',    description: 'Charcoal-grilled chicken thighs with roasted garlic, lemon & wild herbs',    price: '$16.99', model: 'Druidi.glb' },
                ];
            }
            N = MENU.length;
        }

        function preloadModels() {
            const paths = [...new Set(MENU.map(m => m.model || 'food.glb'))];
            return Promise.all(paths.map(p =>
                new Promise((res, rej) =>
                    loader.load(p, gltf => { modelGLTFs[p] = gltf; res(); }, undefined, rej)
                )
            ));
        }

        function cloneModel(menuIdx) {
            const path = MENU[menuIdx].model || 'food.glb';
            const gltf = modelGLTFs[path];
            if (!gltf) return null;
            const obj = gltf.scene.clone(true);
            obj.traverse(n => { if (n.isMesh && n.material) n.material = n.material.clone(); });
            return obj;
        }

        function setSlotModel(slotIdx, menuIdx) {
            const old = meshObjs[slotIdx];
            if (old) slotGroups[slotIdx].remove(old);
            const obj = cloneModel(menuIdx);
            if (obj) {
                // Ground the model: offset Y so its base sits at y=0
                const box = new THREE.Box3().setFromObject(obj);
                if (isFinite(box.min.y)) obj.position.y = -box.min.y;
                slotGroups[slotIdx].add(obj);
                meshObjs[slotIdx] = obj;
            }
        }

        function initSlots() {
            const c = currentCenterMenu;
            menuOf = [mod(c - 1), c, mod(c + 1), mod(c + 2)];
            for (let i = 0; i < 4; i++) setSlotModel(i, menuOf[i]);
            const initOpacities = [CFG.left.opacity, CFG.center.opacity, CFG.right.opacity, 0];
            INIT_ROLES.forEach((role, i) => {
                slotGroups[i].position.x = CFG[role].x;
                slotGroups[i].position.z = CFG[role].z;
                slotGroups[i].scale.setScalar(CFG[role].s);
                setOpacity(i, initOpacities[i]);
            });
        }

        // ── Opacity ───────────────────────────────────────────────────────────
        function setOpacity(idx, opacity) {
            const obj = meshObjs[idx];
            if (!obj) return;
            obj.traverse(n => {
                if (n.isMesh && n.material) {
                    n.material.transparent = opacity < 1.0;
                    n.material.opacity     = Math.max(0, Math.min(1, opacity));
                    n.material.needsUpdate = true;
                }
            });
        }

        function animOpacity(idx, from, to, dur) {
            const t0 = performance.now();
            (function tick(now) {
                const t = Math.min((now - t0) / dur, 1);
                const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
                setOpacity(idx, from + (to - from) * e);
                if (t < 1) requestAnimationFrame(tick);
            })(performance.now());
        }

        // ── Slot animation ────────────────────────────────────────────────────
        function snapSlot(idx, role) {
            slotGroups[idx].position.x = CFG[role].x;
            slotGroups[idx].position.z = CFG[role].z;
            slotGroups[idx].scale.setScalar(CFG[role].s);
        }

        function animSlot(idx, role, dur) {
            const x0 = slotGroups[idx].position.x, x1 = CFG[role].x;
            const z0 = slotGroups[idx].position.z, z1 = CFG[role].z;
            const s0 = slotGroups[idx].scale.x,    s1 = CFG[role].s;
            const t0 = performance.now();
            (function tick(now) {
                const t = Math.min((now - t0) / dur, 1);
                const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
                slotGroups[idx].position.x = x0 + (x1 - x0) * e;
                slotGroups[idx].position.z = z0 + (z1 - z0) * e;
                slotGroups[idx].scale.setScalar(s0 + (s1 - s0) * e);
                if (t < 1) requestAnimationFrame(tick);
            })(performance.now());
        }

        // ── Billboard label sprites ───────────────────────────────────────────
        // Sprites always face camera automatically — no extra look-at needed.
        const labelGroup   = new THREE.Group();
        carouselRoot.add(labelGroup);
        labelGroup.visible = false;
        let labelSprites   = [];

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function makeTextSprite(lines) {
            const W     = 768;
            const lineH = 68;
            const pad   = 18;
            const H     = lines.length * lineH + pad * 2;

            const canvas = document.createElement('canvas');
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(0,0,0,0.60)';
            roundRect(ctx, 0, 0, W, H, 14);
            ctx.fill();

            lines.forEach((line, i) => {
                ctx.font        = `${line.bold ? 'bold ' : ''}${line.size}px sans-serif`;
                ctx.fillStyle   = line.color;
                ctx.textAlign   = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(line.text, W / 2, pad + lineH * i + lineH / 2);
            });

            const tex    = new THREE.CanvasTexture(canvas);
            const mat    = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.40, 0.40 * H / W, 1);
            return sprite;
        }

        function updateLabelSprites() {
            labelSprites.forEach(s => {
                s.material.map.dispose();
                s.material.dispose();
                labelGroup.remove(s);
            });
            labelSprites = [];

            const item = MENU[currentCenterMenu];
            if (!item) return;

            const nameSprite = makeTextSprite([
                { text: item.name, size: 52, color: '#FFFFFF', bold: true }
            ]);
            nameSprite.position.set(0, 0.40, 0);

            const infoSprite = makeTextSprite([
                { text: item.price,       size: 42, color: '#FFD700', bold: true  },
                { text: item.description, size: 28, color: '#CCCCCC', bold: false }
            ]);
            infoSprite.position.set(0, 0.26, 0);

            labelGroup.add(nameSprite);
            labelGroup.add(infoSprite);
            labelSprites.push(nameSprite, infoSprite);
        }

        // ── Navigation ────────────────────────────────────────────────────────
        function goNext() {
            if (isAnimating) return;
            isAnimating = true;
            labelGroup.visible = false;
            const { left: lIdx, center: cIdx, right: rIdx, hidden: hIdx } = slotOf;
            if (hiddenSide === 'farLeft') snapSlot(hIdx, 'farRight');
            menuOf[hIdx] = mod(menuOf[rIdx] + 1);
            setSlotModel(hIdx, menuOf[hIdx]);
            setOpacity(hIdx, 0);
            animSlot(lIdx, 'farLeft', DUR); animSlot(cIdx, 'left',   DUR);
            animSlot(rIdx, 'center',  DUR); animSlot(hIdx, 'right',  DUR);
            animOpacity(lIdx, CFG.left.opacity,   0,                  DUR);
            animOpacity(cIdx, CFG.center.opacity, CFG.left.opacity,   DUR);
            animOpacity(rIdx, CFG.right.opacity,  CFG.center.opacity, DUR);
            animOpacity(hIdx, 0,                  CFG.right.opacity,  DUR);
            setTimeout(() => {
                slotOf = { left: cIdx, center: rIdx, right: hIdx, hidden: lIdx };
                hiddenSide        = 'farLeft';
                currentCenterMenu = mod(currentCenterMenu + 1);
                updateLabel();
                updateLabelSprites();
                if (placed) labelGroup.visible = true;
                isAnimating = false;
            }, DUR + 10);
        }

        function goPrev() {
            if (isAnimating) return;
            isAnimating = true;
            labelGroup.visible = false;
            const { left: lIdx, center: cIdx, right: rIdx, hidden: hIdx } = slotOf;
            if (hiddenSide === 'farRight') snapSlot(hIdx, 'farLeft');
            menuOf[hIdx] = mod(menuOf[lIdx] - 1);
            setSlotModel(hIdx, menuOf[hIdx]);
            setOpacity(hIdx, 0);
            animSlot(rIdx, 'farRight', DUR); animSlot(cIdx, 'right',  DUR);
            animSlot(lIdx, 'center',   DUR); animSlot(hIdx, 'left',   DUR);
            animOpacity(rIdx, CFG.right.opacity,  0,                   DUR);
            animOpacity(cIdx, CFG.center.opacity, CFG.right.opacity,   DUR);
            animOpacity(lIdx, CFG.left.opacity,   CFG.center.opacity,  DUR);
            animOpacity(hIdx, 0,                  CFG.left.opacity,    DUR);
            setTimeout(() => {
                slotOf = { left: hIdx, center: lIdx, right: cIdx, hidden: rIdx };
                hiddenSide        = 'farRight';
                currentCenterMenu = mod(currentCenterMenu - 1);
                updateLabel();
                updateLabelSprites();
                if (placed) labelGroup.visible = true;
                isAnimating = false;
            }, DUR + 10);
        }

        function updateLabel() {
            const item = MENU[currentCenterMenu];
            if (!item) return;
            document.getElementById('item-label').textContent =
                `${item.name} · ${currentCenterMenu + 1} / ${N}`;
        }

        // ── WebXR session management ──────────────────────────────────────────
        let hitTestSource = null;
        let xrSession     = null;

        const preAR    = document.getElementById('pre-ar');
        const overlay  = document.getElementById('ar-overlay');
        const statusEl = document.getElementById('status');
        const btnStart = document.getElementById('btn-start');

        renderer.xr.addEventListener('sessionstart', async () => {
            try {
                const session     = renderer.xr.getSession();
                const viewerSpace = await session.requestReferenceSpace('viewer');
                hitTestSource     = await session.requestHitTestSource({ space: viewerSpace });
            } catch (e) {
                console.error('Hit-test setup failed:', e);
            }
        });

        renderer.xr.addEventListener('sessionend', () => {
            hitTestSource = null;
            placed        = false;
            xrSession     = null;
            carouselRoot.visible = false;
            reticle.visible      = false;
            labelGroup.visible   = false;
            preAR.style.display   = 'flex';
            overlay.style.display = 'none';
            document.getElementById('place-hint').style.display = 'block';
            document.getElementById('item-label').style.display  = 'none';
            document.getElementById('swipe-hint').style.display  = 'none';
            // Reset carousel
            slotOf            = { left: 0, center: 1, right: 2, hidden: 3 };
            menuOf            = [mod(-1), 0, 1, 2];
            hiddenSide        = 'farRight';
            currentCenterMenu = 0;
            isAnimating       = false;
            for (let i = 0; i < 4; i++) setSlotModel(i, menuOf[i]);
            const initOpacities = [CFG.left.opacity, CFG.center.opacity, CFG.right.opacity, 0];
            INIT_ROLES.forEach((role, i) => {
                slotGroups[i].position.x = CFG[role].x;
                slotGroups[i].position.z = CFG[role].z;
                slotGroups[i].scale.setScalar(CFG[role].s);
                setOpacity(i, initOpacities[i]);
            });
            updateLabelSprites();
            updateLabel();
        });

        renderer.setAnimationLoop((time, frame) => {
            if (frame && !placed && hitTestSource) {
                const refSpace = renderer.xr.getReferenceSpace();
                if (refSpace) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        const pose = results[0].getPose(refSpace);
                        if (pose) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(pose.transform.matrix);
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        });

        function onSelect() {
            if (placed || !reticle.visible) return;
            carouselRoot.position.setFromMatrixPosition(reticle.matrix);
            carouselRoot.quaternion.setFromRotationMatrix(reticle.matrix);
            carouselRoot.visible = true;
            labelGroup.visible   = true;
            reticle.visible      = false;
            placed               = true;
            document.getElementById('place-hint').style.display = 'none';
            document.getElementById('item-label').style.display  = 'block';
            document.getElementById('swipe-hint').style.display  = 'block';
        }

        // ── Init flow ─────────────────────────────────────────────────────────
        function showUnsupported(msg) {
            statusEl.textContent = msg;
            document.getElementById('btn-unsupported').style.display = 'block';
        }

        async function init() {
            await fetchMenu();
            const urlItem = parseInt(new URLSearchParams(location.search).get('item'));
            if (!isNaN(urlItem) && urlItem >= 0 && urlItem < N) currentCenterMenu = urlItem;
            try {
                await preloadModels();
            } catch (e) {
                console.warn('Some models failed to preload:', e);
            }
            initSlots();
            updateLabelSprites();
            updateLabel();

            if (!navigator.xr) {
                showUnsupported('WebXR not available on this browser.');
                return;
            }
            navigator.xr.isSessionSupported('immersive-ar')
                .then(ok => {
                    if (ok) {
                        statusEl.textContent   = 'Device ready.';
                        btnStart.style.display = 'block';
                    } else {
                        showUnsupported('AR not supported on this device.');
                    }
                })
                .catch(() => showUnsupported('Could not check AR support.'));
        }

        btnStart.addEventListener('click', async () => {
            statusEl.textContent = 'Starting…';
            try {
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['dom-overlay'],
                    domOverlay: { root: overlay }
                });
            } catch (e) {
                statusEl.textContent = 'Failed to start: ' + e.message;
                return;
            }
            xrSession.addEventListener('select', onSelect);
            await renderer.xr.setSession(xrSession);
            preAR.style.display   = 'none';
            overlay.style.display = 'block';
        });

        document.getElementById('btn-exit').addEventListener('click', () => xrSession?.end());

        // ── Swipe ─────────────────────────────────────────────────────────────
        let tx = 0, ty = 0, tt = 0;
        document.addEventListener('touchstart', e => {
            tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
        }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tx;
            const dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) && Date.now() - tt < 500)
                dx < 0 ? goNext() : goPrev();
        }, { passive: true });

        init();
    </script>
</body>
</html>
