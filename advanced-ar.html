<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Lions — AR View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        [data-theme="night"] {
            --bg:          #0d0d0d;
            --card:        #161616;
            --border:      rgba(240,192,64,0.2);
            --text:        #e0e0e0;
            --dim:         #888888;
            --accent:      #f0c040;
            --accent-text: #0d0d0d;
            --viewer-bg:   #141414;
        }
        [data-theme="day"] {
            --bg:          #f4f4f4;
            --card:        #ffffff;
            --border:      rgba(160,110,0,0.2);
            --text:        #1a1a1a;
            --dim:         #666666;
            --accent:      #a87000;
            --accent-text: #ffffff;
            --viewer-bg:   #e8e8e8;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
            transition: background 0.22s ease, color 0.22s ease;
        }

        /* ── Top bar ── */
        .top-bar {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 0;
        }
        .back-link {
            color: var(--dim);
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--accent); }

        .top-controls {
            display: flex;
            gap: 8px;
        }
        .ctrl-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 14px;
            cursor: pointer;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.22s ease, color 0.22s ease;
        }
        .ctrl-btn:active { opacity: 0.65; }

        /* ── Item info ── */
        .item-info {
            width: 100%;
            max-width: 480px;
            padding: 20px 20px 0;
            text-align: center;
        }
        .item-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 8vw, 2.6rem);
            letter-spacing: 5px;
            color: var(--accent);
            line-height: 1;
            transition: color 0.22s ease;
        }
        .item-desc {
            font-size: 0.82rem;
            color: var(--dim);
            margin-top: 6px;
            line-height: 1.5;
            transition: color 0.22s ease;
        }
        .item-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-top: 6px;
            transition: color 0.22s ease;
        }

        /* ── model-viewer ── */
        model-viewer {
            width: 92vw;
            max-width: 480px;
            height: 54vh;
            background: var(--viewer-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-top: 16px;
            display: block;
            transition: background 0.22s ease, border-color 0.22s ease;
        }

        /* AR button rendered inside model-viewer via slot */
        .ar-launch-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 30px;
            padding: 14px 32px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }
        .ar-launch-btn:active { opacity: 0.75; }

        /* ── Navigation row ── */
        .nav-row {
            display: flex;
            align-items: center;
            width: 92vw;
            max-width: 480px;
            margin-top: 16px;
            gap: 12px;
        }
        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.22s ease, border-color 0.22s ease, color 0.22s ease;
        }
        .nav-btn:active { opacity: 0.65; }
        #item-counter {
            flex: 1;
            color: var(--dim);
            font-size: 13px;
            text-align: center;
            font-weight: 600;
            transition: color 0.22s ease;
        }

        /* No in-AR overlay — AR sessions show only the 3D model */
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">&#8592; Menu</a>
        <div class="top-controls">
            <button class="ctrl-btn" id="theme-toggle">Day</button>
            <button class="ctrl-btn" id="lang-toggle">KA</button>
        </div>
    </div>

    <div class="item-info">
        <div class="item-name"  id="display-name"></div>
        <div class="item-desc"  id="display-desc"></div>
        <div class="item-price" id="display-price"></div>
    </div>

    <model-viewer id="viewer"
        src=""
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        shadow-intensity="1"
        auto-rotate>
        <button slot="ar-button" class="ar-launch-btn" id="ar-slot-btn">View on Table</button>
    </model-viewer>

    <div class="nav-row">
        <button class="nav-btn" id="btn-prev">&#8592;</button>
        <div id="item-counter">&#8211; / &#8211;</div>
        <button class="nav-btn" id="btn-next">&#8594;</button>
    </div>


    <script>
    (function () {
        const viewer = document.getElementById('viewer');

        let MENU    = [];
        let current = 0;
        let inAR    = false;

        // ── Language ──────────────────────────────────────────────────
        let lang = localStorage.getItem('bl-lang') || 'en';

        const STRINGS = {
            en: { arBtn: 'View on Table', langBtn: 'KA', dayBtn: 'Day', nightBtn: 'Night' },
            ka: { arBtn: 'ᲛᲐᲒᲘᲓᲐᲖᲔ ᲜᲐᲮᲕᲐ', langBtn: 'EN', dayBtn: 'Day', nightBtn: 'Night' },
        };

        function tr(item, field) {
            return (lang === 'ka' && item[field + '_ka']) ? item[field + '_ka'] : item[field];
        }

        function applyLang(l) {
            lang = l;
            localStorage.setItem('bl-lang', l);
            const s = STRINGS[l];
            document.getElementById('lang-toggle').textContent  = s.langBtn;
            document.getElementById('ar-slot-btn').textContent  = s.arBtn;
            const theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('theme-toggle').textContent = theme === 'night' ? s.dayBtn : s.nightBtn;
            updateUI();
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            applyLang(lang === 'en' ? 'ka' : 'en');
        });

        // ── Theme ─────────────────────────────────────────────────────
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('bl-theme', theme);
            const s = STRINGS[lang];
            document.getElementById('theme-toggle').textContent = theme === 'night' ? s.dayBtn : s.nightBtn;
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            applyTheme(cur === 'night' ? 'day' : 'night');
        });

        applyTheme(localStorage.getItem('bl-theme') || 'night');

        // ── UI update ─────────────────────────────────────────────────
        function updateUI() {
            const item = MENU[current];
            if (!item) return;

            document.getElementById('item-counter').textContent  = `${current + 1} / ${MENU.length}`;
            document.getElementById('display-name').textContent  = tr(item, 'name');
            document.getElementById('display-desc').textContent  = tr(item, 'description');
            document.getElementById('display-price').textContent = item.price;
        }

        // ── Navigation ────────────────────────────────────────────────
        function navigate(dir) {
            current = ((current + dir) + MENU.length) % MENU.length;
            viewer.src = MENU[current].model || 'food.glb';
            updateUI();
        }

        document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
        document.getElementById('btn-next').addEventListener('click', () => navigate(1));

        // Swipe gesture (works in both preview and AR session via dom-overlay)
        let _tx = 0, _ty = 0, _tt = 0;
        document.addEventListener('touchstart', e => {
            _tx = e.touches[0].clientX;
            _ty = e.touches[0].clientY;
            _tt = Date.now();
        }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - _tx;
            const dy = e.changedTouches[0].clientY - _ty;
            if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) && Date.now() - _tt < 500)
                navigate(dx < 0 ? 1 : -1);
        }, { passive: true });

        // ── AR session events from model-viewer ───────────────────────
        viewer.addEventListener('ar-status', e => {
            const s = e.detail.status;
            if (s === 'session-started')   { inAR = true; }
            else if (s === 'not-presenting') { inAR = false; }
            else if (s === 'failed')         { inAR = false; }
        });

        // ── Boot ──────────────────────────────────────────────────────
        const FALLBACK = [
            { name: 'Druidi',    name_ka: 'დრუიდი',    category: 'Burgers', category_ka: 'ბურგერები', description: 'Ancient grain patty, roasted herbs, olive oil & spiced lamb',         description_ka: 'ძველი მარცვლეულის კოტლეტი შებრაწული მწვანილებით, ზეთისხილის ზეთითა და სანელებლებიანი ბატკნის ხორცით', price: '$18.99', model: 'Druidi.glb' },
            { name: 'Asteroidi', name_ka: 'ასტეროიდი', category: 'Burgers', category_ka: 'ბურგერები', description: 'Crispy smash patty, spiced chickpea & tahini drizzle',                 description_ka: 'ხრაშუნა კოტლეტი სანელებლებიანი ბლის შიგთავსით და ტაჰინის სოუსით',                                          price: '$12.99', model: 'food.glb'   },
            { name: 'Iulius',    name_ka: 'იულიუსი',   category: 'Burgers', category_ka: 'ბურგერები', description: 'Slow-braised veal burger with saffron aioli & gremolata',              description_ka: 'ნელა გახარშული ხბოს ბურგერი შაფრანის ემულსიითა და გრემოლატათი',                                         price: '$24.99', model: 'Druidi.glb' },
            { name: 'Maximus',   name_ka: 'მაქსიმუსი', category: 'Burgers', category_ka: 'ბურგერები', description: 'Double smash patty, aged cheddar & caramelized onions',                description_ka: 'ორმაგი კოტლეტი, ძველებური ჩედარი და კარამელიზებული ხახვი',                                             price: '$16.99', model: 'food.glb'   },
            { name: 'Brutus',    name_ka: 'ბრუტუსი',   category: 'Burgers', category_ka: 'ბურგერები', description: 'Crispy fried chicken thigh with hot honey & pickles',                  description_ka: 'ხრაშუნა შემწვარი წიწილა ცხელი თაფლითა და მარინადებული ბოსტნეულით',                                      price: '$15.99', model: 'Druidi.glb' },
            { name: 'Cassius',   name_ka: 'კასიუსი',   category: 'Burgers', category_ka: 'ბურგერები', description: 'Black bean & roasted pepper patty with chipotle mayo',                 description_ka: 'შავი ლობიოსა და შებრაწული წიწაკის კოტლეტი ჩიპოტლეს მაიონეზით',                                        price: '$13.99', model: 'food.glb'   },
            { name: 'Galius',    name_ka: 'გალიუსი',   category: 'Burgers', category_ka: 'ბურგერები', description: 'Charcoal-grilled chicken with roasted garlic & wild herbs',             description_ka: 'ნახშირზე შემწვარი წიწილა შებრაწული ნიორითა და ველური მწვანილებით',                                      price: '$16.99', model: 'Druidi.glb' },
            { name: 'Pompeii',   name_ka: 'პომპეი',    category: 'Burgers', category_ka: 'ბურგერები', description: 'Wood-fired bun, San Marzano tomato & buffalo mozzarella',               description_ka: 'შეშის ღუმელში გამომცხვარი ბურგერი სან-მარძანოს პომიდვრით და კამეჩის მოცარელათი',                    price: '$14.99', model: 'food.glb'   },
        ];

        fetch('./foods/menu.json')
            .then(r => r.json())
            .catch(() => null)
            .then(data => {
                MENU = data || FALLBACK;
                const urlItem = parseInt(new URLSearchParams(location.search).get('item'));
                if (!isNaN(urlItem) && urlItem >= 0 && urlItem < MENU.length) current = urlItem;
                viewer.src = MENU[current].model || 'food.glb';
                applyLang(lang);
            });
    })();
    </script>
</body>
</html>
