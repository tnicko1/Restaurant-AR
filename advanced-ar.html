<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Premium AR Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 90%; height: 70vh; background-color: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ar-btn { background: #ff4757; color: white; border: none; padding: 15px 30px; border-radius: 30px; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .escape-hatch { margin-top: 15px; background: transparent; color: #aaa; border: 1px solid #555; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <model-viewer src="./food.glb"
                  ar
                  ar-modes="webxr scene-viewer quick-look"
                  camera-controls
                  shadow-intensity="1"
                  auto-rotate>
        <button slot="ar-button" class="ar-btn">View on Table</button>
    </model-viewer>

    <button class="escape-hatch" onclick="window.location.replace('mind-ar-fallback.html')">
        Camera not turning on? Click here.
    </button>

    <button class="escape-hatch" style="bottom: 48px; right: 12px; color: #ff4757; border-color: #ff4757;"
            onclick="window.location.href='ar-webxr.html'">
        &#9883; Try 3-Model WebXR (beta)
    </button>

    <script>
        const viewer = document.querySelector('model-viewer');
        viewer.addEventListener('ar-status', (e) => {
            if (e.detail.status === 'failed') {
                window.location.replace('mind-ar-fallback.html');
            }
        });
    </script>
</body>
</html>
